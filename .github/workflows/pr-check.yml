name: PR validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git diff against origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install langdetect

      - name: Detect changed dataset folders
        id: detect
        run: |
          # List top-level directories touched by the PR
          FOLDERS=$(git diff --name-only origin/main...HEAD \
            | cut -d/ -f1 \
            | sort -u \
            | grep -vxE 'scripts|\.github|\.git|CODEBOOK\.csv|README\.md|LICENSE|TEST\.md' \
            | tr '\n' ' ' \
            | xargs)
          echo "folders=$FOLDERS" >> "$GITHUB_OUTPUT"
          if [ -z "$FOLDERS" ]; then
            echo "No dataset folders changed."
          else
            echo "Detected dataset folders: $FOLDERS"
          fi

      - name: Run validation
        if: ${{ steps.detect.outputs.folders != '' }}
        run: |
          python scripts/validate_submission.py ${{ steps.detect.outputs.folders }}

      - name: Skip validation (no dataset changes)
        if: ${{ steps.detect.outputs.folders == '' }}
        run: echo "No dataset folders changed — skipping validation."