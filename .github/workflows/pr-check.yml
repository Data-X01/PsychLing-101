name: PR validation

on:
  pull_request_target:
    branches: [main]
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    concurrency:
      group: validate-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: false
    # Run on PR events, or on "/validate" comments on PRs
    if: >
      github.event_name == 'pull_request_target' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '/validate')
      )

    steps:
      # ── Resolve PR metadata ──────────────────────────────────────────
      - name: Get PR info (comment trigger)
        if: github.event_name == 'issue_comment'
        id: pr_info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_URL="${{ github.event.issue.pull_request.url }}"
          PR_DATA=$(curl -s -H "Authorization: token $GH_TOKEN" "$PR_URL")
          HEAD_REF=$(echo "$PR_DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['head']['ref'])")
          HEAD_REPO=$(echo "$PR_DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['head']['repo']['clone_url'])")
          HEAD_SHA=$(echo "$PR_DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['head']['sha'])")
          PR_NUMBER=$(echo "$PR_DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['number'])")
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          echo "head_repo=$HEAD_REPO" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Validating PR #$PR_NUMBER (ref: $HEAD_REF, sha: $HEAD_SHA)"

      # ── Checkout main (scripts) then merge PR data ───────────────────
      # pull_request_target already checks out the base (main) by default.
      # For both triggers we checkout main, then merge the PR head on top.
      - name: Check out base repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          lfs: false

      - name: Merge PR changes into main
        env:
          GIT_LFS_SKIP_SMUDGE: "1"
        run: |
          git lfs install
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            HEAD_REPO="${{ steps.pr_info.outputs.head_repo }}"
            HEAD_REF="${{ steps.pr_info.outputs.head_ref }}"
          else
            HEAD_REPO="${{ github.event.pull_request.head.repo.clone_url }}"
            HEAD_REF="${{ github.event.pull_request.head.ref }}"
          fi

          git remote add pr_fork "$HEAD_REPO" 2>/dev/null || true
          git fetch pr_fork "$HEAD_REF"
          git merge FETCH_HEAD --no-edit || {
            echo "::error::Merge conflict — cannot validate this PR automatically."
            exit 1
          }

          # Best-effort LFS: try to resolve pointers (may fail if budget exceeded)
          git lfs fetch origin || true
          git lfs fetch pr_fork "$HEAD_REF" || true
          git lfs checkout || true

      - name: Resolve remaining LFS pointers via Batch API
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            HEAD_REPO="${{ steps.pr_info.outputs.head_repo }}"
          else
            HEAD_REPO="${{ github.event.pull_request.head.repo.clone_url }}"
          fi

          # Build LFS Batch API URL from clone URL
          # https://github.com/user/repo.git -> https://github.com/user/repo.git/info/lfs/objects/batch
          # Ensure the URL ends with .git for the LFS API
          FORK_BASE=$(echo "$HEAD_REPO" | sed 's/\.git$//')
          LFS_API="${FORK_BASE}.git/info/lfs/objects/batch"
          # Also try upstream LFS in case objects live there
          ORIGIN_LFS="https://github.com/${{ github.repository }}.git/info/lfs/objects/batch"

          LFS_SIG="version https://git-lfs.github.com/spec/v1"
          RESOLVED=0

          # Find all files that are still LFS pointers on disk
          find . -path ./.git -prune -o -type f \( -name "*.csv" -o -name "*.zip" \) -print | while read -r path; do
            [ -f "$path" ] || continue
            head -1 "$path" | grep -q "^$LFS_SIG" || continue

            # Parse OID and size from the pointer file
            OID=$(grep '^oid sha256:' "$path" | sed 's/^oid sha256://')
            SIZE=$(grep '^size ' "$path" | awk '{print $2}')

            if [ -z "$OID" ] || [ -z "$SIZE" ]; then
              echo "⚠️  Could not parse LFS pointer: $path — skipping"
              continue
            fi

            echo "Resolving LFS pointer: $path (oid=${OID:0:12}…, size=$SIZE)"

            # Try the LFS Batch API (fork first, then upstream)
            DOWNLOAD_URL=""
            for api_url in "$LFS_API" "$ORIGIN_LFS"; do
              BATCH_RESPONSE=$(curl -sL \
                -X POST \
                -H "Accept: application/vnd.git-lfs+json" \
                -H "Content-Type: application/vnd.git-lfs+json" \
                -H "Authorization: token $GH_TOKEN" \
                -d "{\"operation\":\"download\",\"transfers\":[\"basic\"],\"objects\":[{\"oid\":\"$OID\",\"size\":$SIZE}]}" \
                "$api_url" 2>/dev/null) || continue

              # Extract download URL from the batch response
              DOWNLOAD_URL=$(echo "$BATCH_RESPONSE" \
                | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              for obj in data.get('objects', []):
                  actions = obj.get('actions', {})
                  dl = actions.get('download', {})
                  href = dl.get('href', '')
                  if href:
                      print(href)
                      break
          except Exception:
              pass
          " 2>/dev/null)

              [ -n "$DOWNLOAD_URL" ] && break
            done

            if [ -z "$DOWNLOAD_URL" ]; then
              echo "  ⚠️  Could not resolve via LFS Batch API — skipping"
              continue
            fi

            # Download actual content
            curl -sL "$DOWNLOAD_URL" -o "$path.tmp"

            # Verify it's not still a pointer
            if head -1 "$path.tmp" | grep -q "^$LFS_SIG"; then
              echo "  ⚠️  Downloaded content is still a pointer — skipping"
              rm -f "$path.tmp"
            else
              mv "$path.tmp" "$path"
              echo "  ✅ Resolved ($SIZE bytes)"
              RESOLVED=$((RESOLVED + 1))
            fi
          done
          echo "Resolved $RESOLVED LFS pointer(s) via Batch API"

      # ── Setup ────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Detect & validate ────────────────────────────────────────────
      - name: Detect changed dataset folders
        id: detect
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD 2>/dev/null || true)
          FOLDERS=""
          if [ -n "$CHANGED" ]; then
            FOLDERS=$(echo "$CHANGED" \
              | cut -d/ -f1 \
              | sort -u \
              | grep -vxE 'scripts|\.github|\.git|\..*|CODEBOOK\.csv|README\.md|LICENSE|TEST\.md|test\.md|requirements\.txt' \
              | tr '\n' ' ' \
              | xargs)
          fi
          echo "Detected folders: '${FOLDERS}'"
          if [ -z "$FOLDERS" ]; then
            echo "has_folders=false" >> "$GITHUB_OUTPUT"
            echo "folders=" >> "$GITHUB_OUTPUT"
          else
            echo "has_folders=true" >> "$GITHUB_OUTPUT"
            echo "folders=$FOLDERS" >> "$GITHUB_OUTPUT"
          fi

      - name: Run validation
        if: steps.detect.outputs.has_folders == 'true'
        run: |
          python scripts/validate_submission.py ${{ steps.detect.outputs.folders }} || true

      # ── Post comment directly (no second workflow needed) ────────────
      - name: Post or update PR comment
        if: steps.detect.outputs.has_folders == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            PR_NUMBER="${{ steps.pr_info.outputs.pr_number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi

          MARKER="<!-- validation-bot -->"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ ! -f "validation_summary.md" ]; then
            echo "No validation summary found — skipping comment."
            exit 0
          fi

          {
            echo "$MARKER"
            cat validation_summary.md
            echo ""
            echo "---"
            echo "*🤖 Posted by [PR validation]($RUN_URL)*"
          } > comment_body.md

          # Upsert: update existing bot comment or create new
          EXISTING=$(gh api "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" | head -1)

          if [ -n "$EXISTING" ]; then
            gh api "repos/${GH_REPO}/issues/comments/${EXISTING}" \
              -X PATCH -f body="$(cat comment_body.md)"
            echo "✅ Updated existing comment $EXISTING on PR #$PR_NUMBER"
          else
            gh pr comment "$PR_NUMBER" --body-file comment_body.md
            echo "✅ Created new comment on PR #$PR_NUMBER"
          fi

      # ── Final status ─────────────────────────────────────────────────
      - name: Fail on validation errors
        if: steps.detect.outputs.has_folders == 'true'
        run: |
          python scripts/validate_submission.py ${{ steps.detect.outputs.folders }}

      - name: Skip validation (no dataset changes)
        if: steps.detect.outputs.has_folders != 'true'
        run: echo "No dataset folders changed — skipping validation."